name: Build LMI Server RootFS

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: Server rootfs to build
        required: true
        type: choice
        default: Ubuntu-26-LMI-Server
        options:
          - Ubuntu-24-LMI-Server
          - Ubuntu-26-LMI-Server
          - Debian-12-LMI-Server
          - Debian-13-LMI-Server
          - Arch-LMI-Server
          - Fedora-42-LMI-Server
          - Fedora-43-LMI-Server
          - all
      custom_username:
        description: Default user
        required: true
        type: string
        default: xmzd
      password:
        description: Default password for root and user
        required: true
        type: string
        default: "1"
      enable_zh_tz:
        description: Chinese locale and Asia/Shanghai timezone
        required: true
        type: boolean
        default: true
      enable_kfgj:
        description: Install development toolchain
        required: true
        type: boolean
        default: false
      enable_zip:
        description: Install archive tools
        required: true
        type: boolean
        default: true
      enable_docker:
        description: Install Docker packages inside rootfs
        required: true
        type: boolean
        default: false
      enable_tmoe:
        description: Install tmoe helper
        required: true
        type: boolean
        default: false
      base_image:
        description: Optional base image override
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: lmi-server-rootfs-${{ github.ref }}-${{ github.event.inputs.build_target }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      build_id: ${{ steps.meta.outputs.build_id }}
      build_date: ${{ steps.meta.outputs.build_date }}
    steps:
      - uses: actions/checkout@v4

      - id: matrix
        name: Resolve build matrix
        shell: bash
        run: |
          set -euo pipefail
          target="${{ github.event.inputs.build_target }}"
          if [ "$target" = "all" ]; then
            jq -n -c '[
              "Ubuntu-24-LMI-Server",
              "Ubuntu-26-LMI-Server",
              "Debian-12-LMI-Server",
              "Debian-13-LMI-Server",
              "Arch-LMI-Server",
              "Fedora-42-LMI-Server",
              "Fedora-43-LMI-Server"
            ]' > matrix.json
          else
            jq -n -c --arg target "$target" '[$target]' > matrix.json
          fi
          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"

      - id: meta
        name: Prepare build metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"
          echo "build_id=lmi-server-$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build server rootfs
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BUILD_ID: ${{ needs.setup.outputs.build_id }}
          ENABLE_ZH_TZ: ${{ github.event.inputs.enable_zh_tz }}
          ENABLE_KFGJ: ${{ github.event.inputs.enable_kfgj }}
          ENABLE_ZIP: ${{ github.event.inputs.enable_zip }}
          ENABLE_DOCKER: ${{ github.event.inputs.enable_docker }}
          ENABLE_TMOE: ${{ github.event.inputs.enable_tmoe }}
          USERNAME: ${{ github.event.inputs.custom_username }}
          PASSWORD: ${{ github.event.inputs.password }}
          BASE_IMAGE: ${{ github.event.inputs.base_image }}
          BUILDER: default
        run: |
          set -euo pipefail
          chmod +x build_rootfs-lmi-native.sh scripts/lmi-make-ext4-image.sh scripts/lmi-native-firstboot.sh

          dockerfile=""
          default_base=""
          case "$TARGET" in
            Ubuntu-24-LMI-Server)
              dockerfile="Ubuntu-26-LMI-Native.Dockerfile"
              default_base="ubuntu:24.04"
              ;;
            Ubuntu-26-LMI-Server)
              dockerfile="Ubuntu-26-LMI-Native.Dockerfile"
              ;;
            Debian-12-LMI-Server)
              dockerfile="Debian-13-LMI-Native.Dockerfile"
              default_base="debian:bookworm"
              ;;
            Debian-13-LMI-Server)
              dockerfile="Debian-13-LMI-Native.Dockerfile"
              ;;
            Arch-LMI-Server)
              dockerfile="Arch-LMI-Native.Dockerfile"
              ;;
            Fedora-42-LMI-Server)
              dockerfile="Fedora-43-LMI-Native.Dockerfile"
              default_base="fedora:42"
              ;;
            Fedora-43-LMI-Server)
              dockerfile="Fedora-43-LMI-Native.Dockerfile"
              ;;
            *)
              echo "unknown target: $TARGET" >&2
              exit 2
              ;;
          esac

          effective_base="${BASE_IMAGE:-$default_base}"

          args=(
            -i "$dockerfile"
            -v "$BUILD_ID"
            -K false
            -g "$ENABLE_ZH_TZ"
            -d "$ENABLE_KFGJ"
            -e "$ENABLE_ZIP"
            -f "$ENABLE_DOCKER"
            -h false
            -j "$ENABLE_TMOE"
            -u "$USERNAME"
            -p "$PASSWORD"
          )

          if [ -n "$effective_base" ]; then
            args+=(-B "$effective_base")
          fi

          export OUTPUT_PREFIX="$TARGET"
          ./build_rootfs-lmi-native.sh "${args[@]}"

      - name: Upload server rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-rootfs
          path: |
            *.tar.xz
          if-no-files-found: error
          retention-days: 3

  release:
    needs:
      - setup
      - build
    if: ${{ !cancelled() && needs.setup.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-rootfs"
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release_assets
          find . -maxdepth 1 -type f -name '*.tar.xz' -exec mv -v {} release_assets/ \;
          test "$(find release_assets -type f | wc -l)" -gt 0

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.build_id }}
          name: LMI Server RootFS ${{ needs.setup.outputs.build_id }}
          files: release_assets/*
          body: |
            LMI server rootfs automatic build.

            Build date: ${{ needs.setup.outputs.build_date }}
            Build target: ${{ github.event.inputs.build_target }}
            User: ${{ github.event.inputs.custom_username }}
            Profile: server/headless, KDE disabled, Fcitx disabled.
            This workflow publishes rootfs tarballs only. Convert tar.xz to ext4/sparse images locally before flashing.
